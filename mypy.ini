[mypy]
strict = True
plugins = pydantic.mypy
warn_return_any = True
warn_unused_configs = True

[mypy-vectorbt.*]
ignore_missing_imports = True

[mypy-pandas_ta.*]
ignore_missing_imports = True

[mypy-ccxt.*]
ignore_missing_imports = True

[mypy-xgboost.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True
