# Safety-First Volume Strategy
#
# 目標：以最小虧損滿足月度交易量目標
#
# 核心機制：
#   1. Risk Gate (XGBoost) 判斷「現在進場安全嗎？」
#   2. SMA crossover 決定方向（long / short）
#   3. 狀態機管理持倉：最短持倉、最長持倉、風險退出、方向反轉
#   4. signal=0 表示平倉（signal_as_position 模式）
#   5. 緊急 SL 僅防黑天鵝，不作為常規出場機制

strategy:
  name: "safety_first_volume"
  description: "Safety-first volume strategy — minimize loss, meet volume target"
  parameters:
    risk_model:
      n_estimators: 300
      max_depth: 4
      learning_rate: 0.05
      subsample: 0.7
      colsample_bytree: 0.7
      early_stopping_rounds: 20
      random_state: 42
    risk_threshold: 0.15
    risk_threshold_candidates:
      - 0.05
      - 0.10
      - 0.15
      - 0.20
      - 0.25
    target_holding_bars: 7       # safe target 計算：持倉 7 根 bar
    max_acceptable_loss_pct: 0.0    # 不接受任何淨虧損：|Δ%| < 手續費 → unsafe
    fee_rate: 0.0011             # 單邊手續費 + 滑點

    # Direction: SMA crossover（簡單穩定）
    use_ml_direction: false
    sma_fast: 5
    sma_slow: 20

    # 持倉管理
    min_holding_bars: 5          # 最短持倉 5 min @1m（符合交易所規則）
    max_holding_bars: 30         # 最長持倉 30 min @1m

    # 訓練參數
    lookback_candidates: [360, 720, 1440]  # 6h, 12h, 24h @1m
    retrain_interval: 720        # 每 12 小時重訓
    validation_ratio: 0.2

    # 持倉大小與交易量目標
    position_size_usdt: 3000.0   # 每筆 3,000 USDT
    monthly_volume_target_usdt: 12500000  # 月度單邊 12.5M USDT

validation:
  train_start: "2024-12-01"
  train_end: "2024-12-31"
  test_start: "2025-01-01"
  test_end: "2025-01-15"
  target_metric: "total_return"

backtest:
  symbol: "BTC/USDT"
  timeframe: "1m"
  start_date: "2024-12-01"
  end_date: "2025-01-15"
  init_cash: 100000.0
  fees: 0.0006
  slippage: 0.0005
  position_size_usdt: 3000.0
  stop_loss: 0.03               # 3% 緊急 SL（黑天鵝保護）
  take_profit: null              # 不用 TP，由策略控制出場
  signal_as_position: true       # signal=0 → 平倉
  re_entry_after_sl: false       # SL 後不自動重入場
  mode: "volume"

data:
  source: "binance_api"
  raw_path: "data/raw/btcusdt_1m_2024_2025.csv"
  processed_path: "data/processed/btcusdt_1m_2024_2025.parquet"
