strategy:
  id: "quantile_volume"
  version: "1.0.0"
  class_name: "QuantileStrategy"
  source_path: "src/tradingdev/domain/strategies/bundled/quantile_strategy/strategy.py"
  description: "XGBoost regime-detection volume strategy"
  parameters:
    # Prediction horizon (bars)
    horizon: 30
    horizon_candidates: [15, 30]

    # XGBoost hyperparameters
    n_estimators: 50
    max_depth: 3
    learning_rate: 0.1
    subsample: 0.7
    random_seed: 42

    # Holding management
    min_holding_bars: 2

    # Profit target for label: what counts as "opportunity" (0.3%)
    # Must be > fee cost (0.1%) so winning trades actually profit
    profit_target: 0.003

    # Strategy-level stop-loss: match profit_target for ~1:1 risk/reward
    strategy_sl: 0.003

    # Regime filters: skip when P(both) or P(neither) too high
    max_p_both: 0.15      # avoid coin-flip regimes
    max_p_neither: 0.20   # avoid dead markets

    # Entry: minimum P(long_only) or P(short_only) to enter
    # P(signal) - P(both) must also be > 0
    min_entry_edge: 0.35
    min_entry_edge_candidates: [0.25, 0.30, 0.35, 0.40]

    # Dynamic sizing by edge = P(signal) - P(both)
    dynamic_sizing: true
    min_position_size: 10000.0
    edge_for_full_size: 0.3
    edge_for_full_size_candidates: [0.2, 0.3, 0.5]

    # Position & volume
    position_size: 50000.0
    monthly_volume_target: 12500000
    fee_rate: 0.0005

    # Unused (kept for config compat)
    quantiles: [0.05, 0.10, 0.25, 0.50, 0.75, 0.90, 0.95]
    exit_threshold: 0.0
    exit_threshold_candidates: [0.0]
    validator_n_estimators: 100
    validator_max_depth: 4
    train_subsample_step: 1
    min_ratio: 1.5
    min_ratio_candidates: []

    # Rolling retrain
    retrain_interval: 720    # every 12 hours
    train_window: 2880       # 2 days of recent history

    # fit() objective
    target_metric: "total_volume"
    min_monthly_pnl: -5000

parallel:
  reserve_cores: 2
  safety_factor: 0.6
  overhead_multiplier: 3.0

# Long test: 1 month train + 3 months OOS
validation:
  train_start: "2025-09-01"
  train_end: "2025-09-30"
  test_start: "2025-10-01"
  test_end: "2025-12-30"
  target_metric: "total_return"

backtest:
  symbol: "BTC/USDT"
  timeframe: "1m"
  start_date: "2025-09-01"
  end_date: "2025-12-30"
  fees: 0.0005
  slippage: 0
  monthly_max_loss: 1500.0
  position_size: 50000.0
  stop_loss: 0.01
  take_profit: null
  signal_as_position: true
  re_entry_after_sl: false
  mode: "volume"

data:
  source: "binance_api"
  requirements:
    market:
      source: "binance_api"
      symbol: "BTC/USDT"
      timeframe: "1m"
    features:
      - type: "dvol"
        source: "deribit"
        column: "dvol"
        path: "workspace/data/processed/btc_dvol_1m_2024_2025.parquet"
        raw_path: "workspace/data/raw/btc_dvol_1m_2024_2025.csv"
      - type: "funding_rate"
        source: "binance"
        column: "funding_rate"
        path: "workspace/data/processed/btc_funding_rate_2025.parquet"
